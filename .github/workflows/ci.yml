name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-tests:
    name: Java tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Prepare compose env file
        run: cp .env.example .env

      - name: Run tests
        run: ./gradlew test

  agent-syntax:
    name: Agent syntax checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: agent

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check runtime constants syntax
        run: node --check src/runtime.constants.mjs

      - name: Check agent server syntax
        run: node --check src/server.mjs

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare compose env file
        run: cp .env.example .env

      - name: Build Docker images
        run: docker compose build orchestrator agent
