services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    depends_on:
      - agent
    env_file:
      - .env
    environment:
      AGENT_BASE_URL: http://agent:8081
      DEVFLOW_WORKSPACE_RUN_ROOT: /workspace/runs
    ports:
      - "8080:8080"
    volumes:
      - workspace-runs:/workspace/runs
    networks:
      - control
      - egress

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      PORT: 8081
      DEVFLOW_ORCHESTRATOR_URL: http://orchestrator:8080
      AGENT_MAX_RUN_DURATION_MINUTES: ${AGENT_MAX_RUN_DURATION_MINUTES:-15}
    volumes:
      - workspace-runs:/workspace/runs
      - agent-state:/var/lib/devflow-agent
    networks:
      - control
      - egress

volumes:
  workspace-runs:
  agent-state:

networks:
  control:
    internal: true
  egress:
