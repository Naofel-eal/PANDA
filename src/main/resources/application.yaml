quarkus:
  http:
    host: 0.0.0.0
    port: 8080
  swagger-ui:
    always-include: true
  smallrye-openapi:
    info-title: PANDA Orchestrator API
    info-version: 0.1.0-SNAPSHOT

panda:
  agent-runtime:
    base-url: ${AGENT_BASE_URL:http://agent:8081}
    hard-timeout-minutes: ${AGENT_MAX_RUN_DURATION_MINUTES:15}
    stale-timeout-buffer-minutes: ${AGENT_STALE_TIMEOUT_BUFFER_MINUTES:5}
  agent:
    model: ${OPENCODE_MODEL:}
    small-model: ${OPENCODE_SMALL_MODEL:}
    open-ai-api-key: ${OPENAI_API_KEY:}
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    gemini-api-key: ${GEMINI_API_KEY:}
    copilot-github-token: ${COPILOT_GITHUB_TOKEN:}
  workspace:
    run-root: ${PANDA_WORKSPACE_RUN_ROOT:/workspace/runs}
  jira:
    base-url: ${JIRA_BASE_URL:https://example.atlassian.net}
    user-email: ${JIRA_USER_EMAIL:}
    api-token: ${JIRA_API_TOKEN:}
    epic-key: ${JIRA_EPIC_KEY:}
    todo-status: ${JIRA_TODO_STATUS:To Do}
    in-progress-status: ${JIRA_IN_PROGRESS_STATUS:In Progress}
    blocked-status: ${JIRA_BLOCKED_STATUS:Blocked}
    review-status: ${JIRA_REVIEW_STATUS:To Review}
    validate-status: ${JIRA_VALIDATE_STATUS:To Validate}
    done-status: ${JIRA_DONE_STATUS:Done}
    poll-interval-minutes: ${JIRA_POLL_INTERVAL_MINUTES:1}
    poll-max-results: ${JIRA_POLL_MAX_RESULTS:50}
  github:
    api-url: ${GITHUB_API_URL:https://api.github.com}
    token: ${GITHUB_TOKEN:}
    default-base-branch: ${GITHUB_DEFAULT_BASE_BRANCH:develop}
    commit-user-name: ${GITHUB_COMMIT_USER_NAME:PANDA Bot}
    commit-user-email: ${GITHUB_COMMIT_USER_EMAIL:panda@example.local}
    poll-interval-minutes: ${GITHUB_POLL_INTERVAL_MINUTES:1}
